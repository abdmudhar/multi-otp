<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OTP Multi - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #020617;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            transition: background 0.5s ease-in-out;
            overflow: hidden;
        }

        /* =========================================
           DESAIN MAINTENANCE BARU (CYBER-GLASS)
        ========================================= */
        #maintenance-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            z-index: 9999;
            display: none; /* Ubah via JS atau config di bawah */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .maint-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            max-width: 320px;
            width: 90%;
            position: relative;
        }

        /* Animasi Gear Melayang */
        .gear-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
        }

        .gear-icon {
            font-size: 3.5rem;
            animation: spin 4s linear infinite;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(8, 145, 178, 0.6));
        }

        /* Indikator Titik Berdenyut */
        .pulse-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 12px;
            height: 12px;
            background: #0891b2;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(8, 145, 178, 0.7);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(8, 145, 178, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(8, 145, 178, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(8, 145, 178, 0); }
        }

        /* Efek Teks Berkilau */
        .shimmer {
            background: linear-gradient(90deg, #94a3b8, #f8fafc, #94a3b8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* =========================================
           STYLE DASHBOARD ASLI (DIPERTAHANKAN)
        ========================================= */
        .bg-dashboard-active {
            background-image: url('ops.jpg'); 
            background-size: cover;
            background-position: center;
        }

        #canvas-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            transition: opacity 0.8s ease;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-login-white {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border-top: 4px solid #0891b2;
        }

        .login-card-container {
            width: 100%; max-width: 280px; padding: 20px; text-align: center;
        }

        .profile-img {
            width: 65px; height: 65px; border-radius: 50%; object-fit: cover;
            border: 2px solid #0891b2; margin: 0 auto 6px;
        }

        .btn-login-cyan {
            background: #0891b2; color: white; font-weight: 800; width: 100%;
            padding: 10px; border-radius: 10px; margin-top: 15px;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;
        }

        #app-container { display: none; height: 100vh; width: 100%; flex-direction: column; z-index: 10; }
        #app-frame { width: 100%; flex-grow: 1; border: none; background: white; }
        .nav-glass { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="items-center justify-center p-4">

    <div id="maintenance-screen">
        <div class="maint-container">
            <div class="gear-container">
                <span class="gear-icon">⚙️</span>
                <div class="pulse-dot"></div>
            </div>
            
            <h1 class="text-2xl font-black tracking-tighter shimmer mb-1">SYSTEM UPGRADE</h1>
            <div class="w-12 h-1 bg-cyan-600 mx-auto mb-5 rounded-full"></div>
            
            <p class="text-slate-300 text-[11px] font-medium leading-relaxed uppercase tracking-widest">
                Kami sedang mengoptimalkan <br> sistem untuk Anda.
            </p>
            
            <div class="mt-8 flex items-center justify-center space-x-2">
                <span class="flex h-1.5 w-1.5 rounded-full bg-cyan-500"></span>
                <span class="text-[8px] text-slate-500 uppercase tracking-[0.2em] font-bold">Status: Under Maintenance</span>
            </div>
        </div>
        
        <p class="absolute bottom-10 text-slate-600 text-[8px] uppercase tracking-[0.4em] font-bold">
            &copy; 2026 Admin Panel • Security Protocol Active
        </p>
    </div>

    <canvas id="canvas-bg"></canvas>

    <audio id="sound-success" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
    <audio id="sound-error" src="https://assets.mixkit.co/active_storage/sfx/2857/2857-preview.mp3"></audio>
    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center">
        <div class="glass-login-white login-card-container">
            <div class="flex justify-between mb-3 px-1">
                <span class="text-slate-500 text-[7px] font-bold uppercase" id="login-date">DATE</span>
                <span class="text-slate-500 text-[7px] font-bold uppercase" id="login-clock">00:00:00 WIB</span>
            </div>
            <div class="mb-4">
                <img src="abdul.jpg" alt="Profile" class="profile-img">
                <h2 class="text-slate-800 font-extrabold text-base">Abdul Mudhar</h2>
                <p class="text-slate-500 text-[8px] font-bold uppercase">UPTD SDN Margantoko 2</p>
                <div class="w-8 h-0.5 bg-slate-200 mx-auto my-2"></div>
                <img src="ops1.png" alt="Logo" class="w-24 mx-auto" onerror="this.src='https://via.placeholder.com/120x35?text=LOGO'">
            </div>
            <div class="text-left mb-3">
                <label class="text-slate-600 text-[8px] font-black uppercase mb-1 block">Otentikasi PIN</label>
                <div class="bg-[#f1f5f9] border border-[#e2e8f0] rounded-xl flex items-center px-3">
                    <input type="password" id="admin-pass" placeholder="••••••••" class="w-full py-2 bg-transparent outline-none text-sm">
                </div>
                <p id="error-msg" class="text-rose-500 text-[9px] mt-1 hidden font-bold text-center">PIN SALAH!</p>
            </div>
            <button onclick="checkPassword()" class="btn-login-cyan shadow-lg">Login System</button>
        </div>
    </div>

    <main id="main-menu" class="w-full max-w-md hidden relative z-10">
        <div class="glass-card rounded-[2.5rem] p-8 border-t-8 border-cyan-600 text-center">
            <div id="main-clock" class="text-5xl font-black text-cyan-600 mb-2">00:00:00</div>
            <p id="main-date" class="text-xs font-bold text-slate-600 uppercase tracking-widest mb-6">DATE</p>
            
            <div class="space-y-4 text-left">
                <button onclick="playClick(); openLink('https://abdmudhar.github.io/bookmartotp/')" class="w-full flex items-center p-5 bg-white/90 rounded-2xl border border-slate-200 hover:border-cyan-400 transition-all active:scale-95 shadow-sm">
                    <div class="p-3 bg-cyan-600 text-white rounded-xl font-bold">OTP</div>
                    <div class="ml-4">
                        <h2 class="font-bold text-slate-700">OTP Bookmarklet</h2>
                        <p class="text-xs text-slate-500">Inject tools ke browser</p>
                    </div>
                </button>

                <button onclick="playClick(); openLink('https://abdmudhar.github.io/resetotp/')" class="w-full flex items-center p-5 bg-white/90 rounded-2xl border border-slate-200 hover:border-rose-400 transition-all active:scale-95 shadow-sm">
                    <div class="p-3 bg-rose-600 text-white rounded-xl font-bold">QR</div>
                    <div class="ml-4">
                        <h2 class="font-bold text-slate-700">QR Reset Tool</h2>
                        <p class="text-xs text-slate-500">Bypass sinkronisasi 2FA</p>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <nav id="top-nav" class="hidden fixed top-0 left-0 w-full bg-transparent px-6 py-4 justify-between items-center z-50">
        <button onclick="playClick(); goBack()" class="px-4 py-2 nav-glass text-white text-sm font-semibold rounded-xl border border-white/10">Kembali</button>
        <div id="nav-clock" class="text-white font-mono font-bold nav-glass px-5 py-2 rounded-xl">00:00:00</div>
        <div class="w-20"></div>
    </nav>

    <div id="app-container">
        <iframe id="app-frame" src="" allow="clipboard-write"></iframe>
    </div>

    <script>
        /* =========================================
           KONFIGURASI UTAMA
        ========================================= */
        const MAINTENANCE_MODE = true; // UBAH KE true UNTUK MENGAKTIFKAN MAINTENANCE
        const PIN_ADMIN = "opswilone";

        if (MAINTENANCE_MODE) {
            document.getElementById('maintenance-screen').style.display = 'flex';
            document.getElementById('login-overlay').style.display = 'none';
        }

        const soundSuccess = document.getElementById('sound-success');
        const soundError = document.getElementById('sound-error');
        const soundClick = document.getElementById('sound-click');

        function playClick() { soundClick.currentTime = 0; soundClick.play(); }

        function checkPassword() {
            const input = document.getElementById('admin-pass').value;
            if(input === PIN_ADMIN) {
                soundSuccess.play();
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-menu').classList.remove('hidden');
                document.body.classList.add('bg-dashboard-active');
                document.getElementById('canvas-bg').style.opacity = '0.2';
            } else {
                soundError.play();
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('admin-pass').value = '';
            }
        }

        // Particle Background Logic
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(34, 211, 238, 0.4)'; ctx.fill();
            }
        }
        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!MAINTENANCE_MODE) { // Matikan partikel di menu maintenance agar hemat baterai
                particles.forEach((p, index) => {
                    p.update(); p.draw();
                    for (let j = index + 1; j < particles.length; j++) {
                        const dx = p.x - particles[j].x; const dy = p.y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.beginPath(); ctx.strokeStyle = `rgba(34, 211, 238, ${0.8 - dist / 150})`;
                            ctx.lineWidth = 0.5; ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                        }
                    }
                });
            }
            requestAnimationFrame(animate);
        }
        animate();

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/\./g, ':');
            const dayStr = now.toLocaleDateString('id-ID', { weekday: 'long' });
            const dateStr = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            
            document.getElementById('login-date').textContent = dayStr + ", " + dateStr;
            document.getElementById('login-clock').textContent = timeStr + " WIB";
            if(document.getElementById('main-clock')) document.getElementById('main-clock').textContent = timeStr;
            if(document.getElementById('nav-clock')) document.getElementById('nav-clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function openLink(url) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('top-nav').classList.replace('hidden', 'flex');
            document.getElementById('app-frame').src = url;
            canvas.style.display = 'none';
        }

        function goBack() {
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('top-nav').classList.replace('flex', 'hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('app-frame').src = "";
            canvas.style.display = 'block';
        }
        
        document.getElementById('admin-pass').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });
    </script>
</body>
</html>
